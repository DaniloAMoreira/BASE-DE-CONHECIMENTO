    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-app': 'var(--bg-app)',
                        'bg-subtle': 'var(--bg-subtle)',
                        'bg-panel': 'var(--bg-panel)',
                        'bg-panel-hover': 'var(--bg-panel-hover)',
                        'bg-panel-active': 'var(--bg-panel-active)',
                        'border-subtle': 'var(--border-subtle)',
                        'border-element': 'var(--border-element)',
                        'border-hover': 'var(--border-hover)',
                        'bg-solid': 'var(--bg-solid)',
                        'bg-solid-hover': 'var(--bg-solid-hover)',
                        'text-muted': 'var(--text-muted)',
                        'text-high': 'var(--text-high)',
                        
                        'accent-app': 'var(--accent-app)',
                        'accent-subtle': 'var(--accent-subtle)',
                        'accent-panel': 'var(--accent-panel)',
                        'accent-panel-hover': 'var(--accent-panel-hover)',
                        'accent-panel-active': 'var(--accent-panel-active)',
                        'accent-border-subtle': 'var(--accent-border-subtle)',
                        'accent-border-element': 'var(--accent-border-element)',
                        'accent-border-hover': 'var(--accent-border-hover)',
                        'accent-solid': 'var(--accent-solid)',
                        'accent-solid-hover': 'var(--accent-solid-hover)',
                        'accent-text-muted': 'var(--accent-text-muted)',
                        'accent-text-high': 'var(--accent-text-high)',
                    }
                }
            }
        };

    <style>
        :root {
            /* DARK MODE (Vivid) - Indigo Neutrals & Blue Accents */
            --bg-app: #11131f;
            --bg-subtle: #141726;
            --bg-panel: #182449;
            --bg-panel-hover: #1d2e62;
            --bg-panel-active: #253974;
            
            --border-subtle: #304384;
            --border-element: #3a4f97;
            --border-hover: #435db1;
            
            --bg-solid: #3e63dd;
            --bg-solid-hover: #5472e4;
            
            --text-muted: #9eb1ff;
            --text-high: #d6e1ff;

            --accent-app: #0b161a;
            --accent-subtle: #101b20;
            --accent-panel: #082c36;
            --accent-panel-hover: #003848;
            --accent-panel-active: #004558;
            
            --accent-border-subtle: #045468;
            --accent-border-element: #12677e;
            --accent-border-hover: #11809c;
            
            --accent-solid: #00a2c7;
            --accent-solid-hover: #23afd0;
            
            --accent-text-muted: #4ccce6;
            --accent-text-high: #b6ecf7;
        }

        body[data-theme="light"] {
            /* LIGHT MODE - Slate Neutrals & Blue Accents */
            --bg-app: #fcfcfd;
            --bg-subtle: #f9f9fb;
            --bg-panel: #f0f0f3;
            --bg-panel-hover: #e8e8ec;
            --bg-panel-active: #e0e1e6;
            
            --border-subtle: #d9d9e0;
            --border-element: #cdced6;
            --border-hover: #b9bbc6;
            
            --bg-solid: #8b8d98;
            --bg-solid-hover: #80838d;
            
            --text-muted: #60646c;
            --text-high: #1c2024;

            --accent-app: #fbfdff;
            --accent-subtle: #f4faff;
            --accent-panel: #e6f4fe;
            --accent-panel-hover: #d5efff;
            --accent-panel-active: #c2e5ff;
            
            --accent-border-subtle: #acd8fc;
            --accent-border-element: #8ec8f6;
            --accent-border-hover: #5eb1ef;
            
            --accent-solid: #0090ff;
            --accent-solid-hover: #0588f0;
            
            --accent-text-muted: #0d74ce;
            --accent-text-high: #0d74ce; 
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-app);
            color: var(--text-high);
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #searchInput {
            color: var(--text-high);
            background-color: var(--color-search-bg);
            border: 1px solid var(--color-search-border);
        }

        #searchInput::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            color: var(--text-muted);
        }

        h1.text-accent-solid,
        .category-header h3 {
            color: var(--text-high);
        }

        body[data-theme="light"] #searchInput {
            background-color: #FFFFFF;
            border: 1px solid #D1D5DB;
            color: var(--text-high);
        }

        body[data-theme="light"] #searchInput::placeholder,
        body[data-theme="light"] .search-icon {
            color: var(--text-muted);
        }

        body[data-theme="light"] h1.text-accent-solid,
        body[data-theme="light"] .category-header h3 {
            color: var(--accent-solid);
        }

        #webgl-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .panel {
            background: color-mix(in srgb, var(--bg-panel) 85%, transparent);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-subtle);
            box-shadow: 0 8px 32px 0 rgba(10, 15, 31, 0.37);
            border-radius: 0.75rem;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .subject-list {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.5s ease-in-out;
        }

        .subject-list>div {
            overflow: hidden;
        }

        .subject-list.expanded {
            grid-template-rows: 1fr;
        }

        .rotate-180 {
            transform: rotate(180deg);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-app);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-solid);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-solid);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        .glow-on-hover {
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        .glow-on-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px 2px var(--accent-solid);
        }

        .loading {
            opacity: 0.5;
            pointer-events: none;
        }

        /* ESTILOS PARA SUGESTÕES QUE EMPURRAM O CONTEÚDO */
        #suggestionsContainer {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-in-out;
            background: var(--color-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 0.5rem;
            overflow: hidden;
        }

        #suggestionsContainer.expanded {
            grid-template-rows: 1fr;
            margin-bottom: 1rem;
        }

        #suggestionsContainer>div {
            min-height: 0;
        }

        .suggestion-item {
            padding: 0.6rem 1rem;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .suggestion-item:not(:last-child) {
            border-bottom: 1px solid var(--border-subtle);
        }

        .suggestion-item:hover,
        .suggestion-item.active {
            background-color: var(--color-search-bg);
            color: var(--text-high);
        }

        /* ANIMAÇÃO PARA ÍCONE NEURAL */
        @keyframes pulse {

            0%,
            100% {
                transform: scale(0.9);
                opacity: 0.7;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        .neural-dot {
            transform-origin: center;
            animation: pulse 2s infinite ease-in-out;
        }

        .neural-dot-1 {
            animation-delay: 0s;
        }

        .neural-dot-2 {
            animation-delay: 0.3s;
        }

        .neural-dot-3 {
            animation-delay: 0.6s;
        }

        /* ESTILOS PARA ABAS */
        .tab-active {
            color: var(--text-high);
            border-bottom: 2px solid var(--accent-solid);
        }

        body[data-theme="light"] .tab-active {
            color: var(--accent-solid);
        }

        .tab-inactive {
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
        }

        .tab-inactive:hover {
            color: var(--text-high);
        }

        body[data-theme="light"] .tab-inactive:hover {
            color: var(--accent-solid);
        }
    </style>
</head>

    <script>
        const SUPABASE_URL = 'https://jqllbwlfikckavipqtfr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxbGxid2xmaWtja2F2aXBxdGZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NzczMDQsImV4cCI6MjA5ODA1MzMwNH0.adNqWBWMY3PlIx_0OG1bMswbVR_TThtCmNWFptxkgRU';

        // Função para visualizar
        window.viewCommand = (text) => {
            const infoModal = document.getElementById('infoModal');
            const infoMessage = document.getElementById('infoMessage');

            infoMessage.style.whiteSpace = 'pre-wrap';
            infoMessage.style.wordBreak = 'break-word';
            infoMessage.style.fontFamily = 'monospace';

            infoMessage.textContent = text || 'Aviso: Comando vazio ou não encontrado no JSON.';
            infoModal.classList.remove('hidden');
        };

        // Função para download virtual
        window.downloadFile = (text, fileName) => {
            if (!text || text === 'undefined' || text.trim() === '') {
                const infoModal = document.getElementById('infoModal');
                const infoMessage = document.getElementById('infoMessage');
                infoMessage.style.whiteSpace = 'pre-wrap';
                infoMessage.style.fontFamily = 'monospace';
                infoMessage.textContent = 'Aviso: O comando está vazio no JSON. \nInsira o código correspondente no arquivo comandos.json na propriedade "command" para poder efetuar o download.';
                infoModal.classList.remove('hidden');
                return;
            }

            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');

            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        // Função para copiar com plano B
        window.copyCommand = (text, btnElement) => {
            const showNotification = () => {
                if (btnElement && btnElement.nextElementSibling && btnElement.nextElementSibling.classList.contains('copy-notification')) {
                    btnElement.nextElementSibling.remove();
                }
                if (btnElement) {
                    const notif = document.createElement('div');
                    notif.className = 'copy-notification absolute top-full left-1/2 transform -translate-x-1/2 mt-1 px-2 py-1 bg-green-600 text-white text-[10px] rounded shadow-lg whitespace-nowrap z-50 pointer-events-none transition-opacity duration-300';
                    notif.textContent = 'Copiado!';
                    btnElement.parentNode.appendChild(notif);

                    setTimeout(() => {
                        if (notif.parentNode) {
                            notif.style.opacity = '0';
                            setTimeout(() => {
                                if (notif.parentNode) notif.remove();
                            }, 300);
                        }
                    }, 1500);
                }
            };

            const fallbackCopy = (textToCopy) => {
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy || '';
                textArea.style.position = "fixed";
                textArea.style.top = "0";
                textArea.style.left = "0";
                textArea.style.opacity = "0";

                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();

                try {
                    const successful = document.execCommand('copy');
                    if (successful) showNotification();
                    else alert('Erro: Não foi possível copiar o comando.');
                } catch (err) {
                    console.error('Erro no fallback de cópia', err);
                }

                document.body.removeChild(textArea);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text || '').then(() => {
                    showNotification();
                }).catch(err => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            // --- Elementos do DOM ---
            const searchInput = document.getElementById('searchInput');
            const categoriesContainer = document.getElementById('categoriesContainer');
            const suggestionsContainer = document.getElementById('suggestionsContainer');
            const infoModal = document.getElementById('infoModal');
            const infoOkBtn = document.getElementById('infoOkBtn');

            // --- Variáveis de Estado ---
            let allComandos = [];
            let allSuggestions = [];
            let isDevMode = false;
            let activeSuggestionIndex = -1;
            let isDataLoaded = false;


            // --- Lógica do Modal Adicionar Comando ---
            const addModal = document.getElementById('addModal');
            const openAddModalBtn = document.getElementById('openAddModalBtn');
            const cancelAddBtn = document.getElementById('cancelAddBtn');
            const saveCommandBtn = document.getElementById('saveCommandBtn');
            const commandTitleInput = document.getElementById('commandTitleInput');
            const commandTextInput = document.getElementById('commandTextInput');

            // --- Lógica para Gavetas Internas Dinâmicas (Modal) ---
            
            window.modalSubCommands = [];
            window.activeModalTabIndex = 0;

            window.renderModalSubCommands = () => {
                const tabsContainer = document.getElementById('modalTabsContainer');
                const contentContainer = document.getElementById('modalContentContainer');
                if (!tabsContainer || !contentContainer) return;

                tabsContainer.innerHTML = '';
                contentContainer.innerHTML = '';

                if (window.modalSubCommands.length === 0) {
                    contentContainer.innerHTML = '<div class="text-text-muted text-sm flex items-center justify-center h-full text-center">Nenhuma aba criada.<br>Clique no "+" ao lado para adicionar.</div>';
                    return;
                }

                window.modalSubCommands.forEach((sc, idx) => {
                    const isActive = idx === window.activeModalTabIndex;
                    const btnClass = isActive ? 'bg-bg-solid text-white border-border-element shadow-md scale-[1.02]' : 'bg-bg-panel border-border-element text-text-high hover:bg-bg-solid-hover hover:text-white hover:shadow-md hover:scale-[1.02] transition-all';
                    tabsContainer.innerHTML += `<button type="button" onclick="switchModalTab(${idx})" class="w-full text-left px-3 py-2 rounded-md text-sm font-medium transition-colors border truncate shrink-0 ${btnClass}">${sc.name || 'Nova Aba'}</button>`;
                });

                const activeSc = window.modalSubCommands[window.activeModalTabIndex];
                contentContainer.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-xs font-medium text-text-muted">Nome da Aba (Ex: Select)</label>
                        <button type="button" onclick="removeModalTab(${window.activeModalTabIndex})" class="text-red-500 hover:text-red-700 flex items-center justify-center p-1 rounded-md hover:bg-red-500/10 transition-all hover:scale-110 hover:shadow-sm" title="Remover Aba">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                    <input type="text" value="${(activeSc.name || '').replace(/"/g, '&quot;')}" class="w-full rounded-md px-3 py-1.5 mb-3 bg-[color:var(--bg-app)] border border-border-element text-text-high focus:outline-none focus:ring-1 focus:ring-accent text-sm" oninput="updateActiveModalTab('name', this.value)">
                    
                    <label class="block text-xs font-medium text-text-muted mb-1">Descrição (Obrigatório)</label>
                    <input type="text" value="${(activeSc.desc || '').replace(/"/g, '&quot;')}" class="w-full rounded-md px-3 py-1.5 mb-3 bg-[color:var(--bg-app)] border border-border-element text-text-high focus:outline-none focus:ring-1 focus:ring-accent text-sm" placeholder="Para que serve este comando?" oninput="updateActiveModalTab('desc', this.value)">
                    
                    <label class="block text-xs font-medium text-text-muted mb-1">Comando SQL</label>
                    <textarea rows="4" class="w-full rounded-md px-3 py-1.5 bg-[color:var(--bg-app)] border border-border-element text-text-high focus:outline-none focus:ring-1 focus:ring-accent font-mono text-xs custom-scrollbar flex-grow min-h-[80px]" oninput="updateActiveModalTab('text', this.value)">${activeSc.text || ''}</textarea>
                `;
            };

            window.addNewModalSubCommand = () => {
                window.modalSubCommands.push({ name: 'Nova Aba', text: '', desc: '' });
                window.activeModalTabIndex = window.modalSubCommands.length - 1;
                window.renderModalSubCommands();
            };

            window.switchModalTab = (idx) => {
                window.activeModalTabIndex = idx;
                window.renderModalSubCommands();
            };

            window.removeModalTab = (idx) => {
                window.modalSubCommands.splice(idx, 1);
                if (window.activeModalTabIndex >= window.modalSubCommands.length) {
                    window.activeModalTabIndex = Math.max(0, window.modalSubCommands.length - 1);
                }
                window.renderModalSubCommands();
            };

            window.updateActiveModalTab = (field, value) => {
                if (window.modalSubCommands[window.activeModalTabIndex]) {
                    window.modalSubCommands[window.activeModalTabIndex][field] = value;
                    if (field === 'name') {
                        const tabs = document.getElementById('modalTabsContainer').children;
                        if (tabs[window.activeModalTabIndex]) {
                            tabs[window.activeModalTabIndex].textContent = value || 'Nova Aba';
                        }
                    }
                }
            };


            window.isAdminAuthenticated = false;
            let pendingAdminAction = null;
            const passwordPopover = document.getElementById('passwordPopover');
            const adminPasswordInput = document.getElementById('adminPasswordInput');
            const submitPasswordBtn = document.getElementById('submitPasswordBtn');
            const passwordError = document.getElementById('passwordError');

            window.requireAdmin = (actionCallback) => {
                if (window.isAdminAuthenticated) {
                    actionCallback();

                        body: JSON.stringify({

                            password: password
                        })

                    const data = await res.json();
                    
                    if (data.access_token) {
                        window.adminToken = data.access_token;
                        window.isAdminAuthenticated = true;
                        passwordPopover.classList.add('hidden');
                        passwordError.classList.add('hidden');
                        if (pendingAdminAction) {

                    submitBtn.textContent = 'Confirmar';
                    submitBtn.disabled = false;

                        </div>
                        <div class="hidden p-3 pt-0 border-t border-border-subtle bg-[color:var(--bg-app)] rounded-b-md">
                            <div class="flex overflow-x-auto custom-scrollbar gap-2 pb-3 mb-1 pt-3">
                                ${tabsHTML}
                            </div>
                            <div class="panels-container">
                                ${panelsHTML}
                            </div>
                        </div>
                    </div>
                    `;

                    categoriesContainer.appendChild(categoryElement);
                });
            };

            const handleSearch = () => {
                if (!isDataLoaded) return;
                const searchTerm = normalizeString(searchInput.value.trim());
                if (!searchTerm) {
                    render(allComandos);
                    return;
                }
                const searchResults = allComandos.filter(cmd => {
                    const catNameMatches = normalizeString(cmd.name).includes(searchTerm);
                    if (catNameMatches) return true;
                    
                    let subMatches = false;
                    try {
                        const scs = JSON.parse(cmd.command);
                        if (Array.isArray(scs)) {
                            subMatches = scs.some(sc => normalizeString(sc.name).includes(searchTerm));
                        }
                    } catch (e) {}
                    return subMatches;
                });
                render(searchResults);
            };

            // (Listener antigo removido, agora o listener é adicionado no próprio elemento renderizado)

            // --- INICIALIZAÇÃO DA APLICAÇÃO ---
            const initializeApp = () => {
                ThemeSwitcher.init();
                initWebGLBackground();

                searchInput.addEventListener('input', handleAutocomplete);

                searchInput.addEventListener('keydown', (e) => {
                    const items = suggestionsContainer.querySelectorAll('.suggestion-item');
                    if (e.key === 'Enter') {
                        const val = searchInput.value.trim().toLowerCase();
                        if (val === 'admin') {
                            e.preventDefault();
                            isDevMode = !isDevMode;
                            searchInput.value = '';
                            suggestionsContainer.classList.remove('expanded');
                            render(allComandos);
                            return;
                        }
                    }
                    if (!suggestionsContainer.classList.contains('expanded') || items.length === 0) return;

                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        activeSuggestionIndex = (activeSuggestionIndex + 1) % items.length;
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        activeSuggestionIndex = (activeSuggestionIndex - 1 + items.length) % items.length;
                    }
                    items.forEach((item, index) => item.classList.toggle('active', index === activeSuggestionIndex));

                    if (e.key === 'Enter') {
                        e.preventDefault();


                        if (activeSuggestionIndex > -1 && items[activeSuggestionIndex]) {
                            items[activeSuggestionIndex].click();
                        } else {
                            suggestionsContainer.classList.remove('expanded');
                            handleSearch();
                        }
                    }
                });

                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.dev-menu') && !e.target.closest('button[onclick*="toggleDevMenu"]')) {
                        document.querySelectorAll('.dev-menu').forEach(m => m.classList.add('hidden'));
                    }
                    if (!e.target.closest('header')) {
                        suggestionsContainer.classList.remove('expanded');
                    }
                });

                loadData();
            };

            initializeApp();
        });
    </script>

    <!-- Modal Adicionar Comando -->
    <div id="addModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden p-4 sm:p-6">
        <div class="panel w-full max-w-5xl p-6 flex flex-col max-h-[90vh] shadow-2xl">
            <h3 class="text-xl font-semibold mb-4 text-accent-solid">Adicionar Novo Comando</h3>
            
            <div class="space-y-4 mb-6 overflow-y-auto custom-scrollbar pr-2 flex-grow">
                <div>
                    <label class="block text-sm font-medium text-text-muted mb-1">Título do Comando</label>
                    <input type="text" id="commandTitleInput" placeholder="Ex: Update LC Sistemas..." class="w-full rounded-lg px-3 py-2 bg-bg-panel border border-border-element text-text-high focus:outline-none focus:ring-2 focus:ring-accent">
                </div>

                <div>
                    
                    <div class="flex flex-col sm:flex-row gap-4">
                        <div class="flex flex-col gap-2 w-full sm:w-1/3 md:w-1/4">
                            <button type="button" onclick="addNewModalSubCommand()" class="w-full py-2 bg-accent-solid/20 border border-accent-border-element text-accent-solid rounded-lg hover:bg-accent-solid-hover hover:text-white transition-all flex justify-center items-center font-bold text-xl shrink-0 hover:shadow-lg hover:-translate-y-0.5 glow-on-hover" title="Adicionar Aba">
                                +
                            </button>
                            <div id="modalTabsContainer" class="flex flex-col gap-2 max-h-64 overflow-y-auto custom-scrollbar pr-1">
                                <!-- Tabs rendered via JS -->
                            </div>
                        </div>
                        
                        <div class="flex-grow p-4 bg-black/20 border border-border-subtle rounded-lg relative min-h-[260px] flex flex-col" id="modalContentContainer" style="min-width: 0;">
                            <!-- Content rendered via JS -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex justify-end gap-3 shrink-0 pt-4 border-t border-border-subtle">
                <button id="cancelAddBtn" class="px-4 py-2 bg-bg-panel border border-border-element text-text-high rounded-lg hover:bg-bg-solid-hover transition-all hover:shadow-md hover:-translate-y-0.5">Cancelar</button>
                <button id="saveCommandBtn" class="px-4 py-2 bg-accent-solid hover:opacity-90 text-white rounded-lg transition-all shadow-md hover:shadow-lg hover:shadow-accent/40 hover:-translate-y-0.5 glow-on-hover">Salvar Comando</button>
            </div>
        </div>
    </div>


    <!-- Confirm Delete Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[60] hidden p-4">
        <div class="panel w-full max-w-sm p-6 rounded-xl flex flex-col items-center text-center">
            <div class="w-12 h-12 rounded-full bg-red-500/20 flex items-center justify-center mb-4 text-red-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <h3 class="text-xl font-semibold mb-2 text-text-high">Excluir Comando?</h3>
            <p class="text-text-muted text-sm mb-6">Tem certeza que deseja excluir este comando? Esta ação não pode ser desfeita.</p>
            <div class="flex justify-center gap-3 w-full">
                <button id="cancelDeleteBtn" class="flex-1 px-4 py-2 bg-bg-panel border border-border-subtle text-text-high rounded-lg hover:bg-bg-solid-hover transition-colors">Cancelar</button>
                <button id="confirmDeleteBtn" class="flex-1 px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg transition-colors shadow-lg">Sim, Excluir</button>
            </div>
        </div>
    </div>
</body>
