<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>Base de Conhecimento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #080c14;
            --surface: #0d1424;
            --surface-2: #111b2e;
            --border: rgba(99, 179, 237, 0.1);
            --border-hover: rgba(99, 179, 237, 0.3);
            --text: #e2eaf6;
            --text-muted: #5a7299;
            --text-dim: #2d4466;
            --accent: #63b3ed;
            --accent-2: #4fd1c5;
            --accent-glow: rgba(99, 179, 237, 0.15);
            --danger: #fc8181;
            --tag-bg: rgba(99, 179, 237, 0.08);
            --input-bg: rgba(13, 20, 36, 0.8);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #f0f4fa;
            --surface: #ffffff;
            --surface-2: #e8f0fe;
            --border: rgba(37, 99, 235, 0.12);
            --border-hover: rgba(37, 99, 235, 0.35);
            --text: #0f172a;
            --text-muted: #64748b;
            --text-dim: #cbd5e1;
            --accent: #2563eb;
            --accent-2: #0d9488;
            --accent-glow: rgba(37, 99, 235, 0.1);
            --danger: #dc2626;
            --tag-bg: rgba(37, 99, 235, 0.07);
            --input-bg: rgba(255, 255, 255, 0.9);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition), color var(--transition);
        }

        /* ── CANVAS ── */
        #webgl-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ── LAYOUT ── */
        #app {
            position: relative;
            z-index: 1;
            max-width: 820px;
            margin: 0 auto;
            padding: 2rem 1.25rem 4rem;
        }

        /* ── HEADER ── */
        .site-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            padding-top: 0.5rem;
        }

        .logo-block {}

        .logo-eyebrow {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.35rem;
            opacity: 0.7;
        }

        .logo-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 800;
            line-height: 1;
            color: var(--text);
            letter-spacing: -0.03em;
        }

        .logo-title span {
            color: var(--accent);
        }

        .logo-subtitle {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            letter-spacing: 0.05em;
        }

        /* ── THEME TOGGLE ── */
        .theme-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 38px;
            height: 38px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            flex-shrink: 0;
            margin-top: 0.25rem;
        }

        .theme-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        /* ── SEARCH ── */
        .search-wrapper {
            position: relative;
            margin-bottom: 0.5rem;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            transition: color var(--transition);
        }

        .search-clear {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            display: none;
            line-height: 0;
        }

        .search-clear:hover { color: var(--danger); }

        #searchInput {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            padding: 0.85rem 2.75rem 0.85rem 2.75rem;
            border-radius: 12px;
            outline: none;
            transition: all var(--transition);
        }

        #searchInput::placeholder { color: var(--text-muted); }

        #searchInput:focus {
            border-color: var(--accent);
            background: var(--input-bg);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #searchInput:focus ~ .search-icon { color: var(--accent); }

        /* ── STATS BAR ── */
        .stats-bar {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-bottom: 1.5rem;
            padding: 0 0.25rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        .stat-item { display: flex; align-items: center; gap: 0.4rem; }
        .stat-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.6;
        }

        /* ── SUGGESTIONS ── */
        .suggestions-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1rem;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.3s ease, opacity 0.2s ease;
        }

        .suggestions-box.open {
            max-height: 280px;
            opacity: 1;
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.65rem 1rem;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            transition: all var(--transition);
        }

        .suggestion-item:last-child { border-bottom: none; }

        .suggestion-item:hover, .suggestion-item.active {
            background: var(--accent-glow);
            color: var(--text);
            padding-left: 1.25rem;
        }

        .suggestion-icon {
            color: var(--accent);
            opacity: 0.5;
            flex-shrink: 0;
        }

        /* ── CATEGORIES ── */
        #categoriesContainer {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .category-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: border-color var(--transition), box-shadow var(--transition);
            animation: slideUp 0.4s ease both;
        }

        .category-card:hover {
            border-color: var(--border-hover);
        }

        .category-card.is-open {
            border-color: var(--border-hover);
            box-shadow: 0 4px 24px rgba(99, 179, 237, 0.06);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── CATEGORY HEADER ── */
        .cat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            cursor: pointer;
            gap: 1rem;
            user-select: none;
        }

        .cat-header-left {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            min-width: 0;
        }

        .cat-index {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            font-weight: 500;
            color: var(--accent);
            opacity: 0.5;
            flex-shrink: 0;
            letter-spacing: 0.05em;
        }

        .cat-name {
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.01em;
        }

        .cat-count {
            font-size: 0.65rem;
            color: var(--accent);
            background: var(--tag-bg);
            border: 1px solid var(--border);
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            flex-shrink: 0;
            font-weight: 500;
        }

        .cat-chevron {
            color: var(--text-dim);
            flex-shrink: 0;
            transition: transform var(--transition), color var(--transition);
        }

        .cat-header:hover .cat-chevron { color: var(--accent); }

        .category-card.is-open .cat-chevron {
            transform: rotate(180deg);
            color: var(--accent);
        }

        /* ── SUBJECTS LIST ── */
        .subjects-panel {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .subjects-panel.open { grid-template-rows: 1fr; }

        .subjects-inner {
            overflow: hidden;
        }

        .subjects-list {
            padding: 0 1.25rem 1rem;
            border-top: 1px solid var(--border);
            margin-top: 0;
        }

        .subject-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            transition: padding-left var(--transition);
        }

        .subject-item:last-child { border-bottom: none; }

        .subject-item:hover { padding-left: 0.25rem; }

        .subject-bullet {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.3;
            flex-shrink: 0;
        }

        .subject-name {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .subject-name mark {
            background: transparent;
            color: var(--accent);
            font-weight: 600;
        }

        .subjects-empty {
            padding: 0.75rem 0;
            font-size: 0.75rem;
            color: var(--text-dim);
            font-style: italic;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 0.85rem;
            letter-spacing: 0.03em;
        }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal-box {
            background: var(--surface-2);
            border: 1px solid var(--border-hover);
            border-radius: 16px;
            padding: 1.75rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            transform: translateY(12px);
            transition: transform var(--transition);
        }

        .modal-overlay.open .modal-box { transform: translateY(0); }

        .modal-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--accent);
        }

        .modal-msg {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .modal-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            float: right;
            transition: opacity var(--transition);
        }

        .modal-btn:hover { opacity: 0.85; }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* ── LOADING ── */
        .skeleton {
            background: linear-gradient(90deg, var(--surface) 25%, var(--surface-2) 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 14px;
            height: 52px;
            margin-bottom: 0.6rem;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── SEARCH RESULTS COUNT ── */
        .search-result-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 0 0.25rem;
            margin-bottom: 0.75rem;
            display: none;
        }

        .search-result-label.visible { display: block; }

        /* ── FADE IN ── */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        #app { animation: fadeIn 0.5s ease; }

        /* Stagger cards */
        .category-card:nth-child(1) { animation-delay: 0.05s; }
        .category-card:nth-child(2) { animation-delay: 0.1s; }
        .category-card:nth-child(3) { animation-delay: 0.15s; }
        .category-card:nth-child(4) { animation-delay: 0.2s; }
        .category-card:nth-child(5) { animation-delay: 0.25s; }
        .category-card:nth-child(n+6) { animation-delay: 0.3s; }
    </style>
</head>
<body>
<canvas id="webgl-bg"></canvas>

<div id="app">
    <!-- Header -->
    <header class="site-header">
        <div class="logo-block">
            <p class="logo-eyebrow">// sistema</p>
            <h1 class="logo-title">Base de <span>Conhecimento</span></h1>
            <p class="logo-subtitle">Navegue por categorias e assuntos</p>
        </div>
        <button class="theme-btn" id="themeBtn" title="Alternar tema">
            <svg id="iconSun" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="hidden"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <svg id="iconMoon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
    </header>

    <!-- Search -->
    <div class="search-wrapper">
        <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Pesquisar categorias e assuntos..." autocomplete="off" spellcheck="false">
        <button class="search-clear" id="clearBtn" title="Limpar">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
    </div>

    <!-- Suggestions -->
    <div class="suggestions-box" id="suggestionsBox"></div>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar">
        <div class="stat-item">
            <div class="stat-dot"></div>
            <span id="statCats">— categorias</span>
        </div>
        <div class="stat-item">
            <div class="stat-dot" style="background: var(--accent-2)"></div>
            <span id="statSubs">— assuntos</span>
        </div>
    </div>

    <!-- Result label -->
    <div class="search-result-label" id="resultLabel"></div>

    <!-- Categories -->
    <main id="categoriesContainer"></main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal-box">
        <p class="modal-title">Aviso</p>
        <p class="modal-msg" id="modalMsg"></p>
        <button class="modal-btn" id="modalOk">OK</button>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // ── Elements ──
    const $ = id => document.getElementById(id);
    const searchInput = $('searchInput');
    const clearBtn = $('clearBtn');
    const suggestionsBox = $('suggestionsBox');
    const categoriesContainer = $('categoriesContainer');
    const statsBar = $('statsBar');
    const statCats = $('statCats');
    const statSubs = $('statSubs');
    const resultLabel = $('resultLabel');
    const modal = $('modal');
    const modalMsg = $('modalMsg');
    const modalOk = $('modalOk');
    const themeBtn = $('themeBtn');
    const iconSun = $('iconSun');
    const iconMoon = $('iconMoon');

    // ── State ──
    let categories = [];
    let allSuggestions = [];
    let activeIdx = -1;
    let loaded = false;

    // ── Theme ──
    const applyTheme = t => {
        document.documentElement.dataset.theme = t;
        localStorage.setItem('kb-theme', t);
        iconSun.classList.toggle('hidden', t === 'dark');
        iconMoon.classList.toggle('hidden', t === 'light');
    };
    themeBtn.addEventListener('click', () => {
        applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
    });
    applyTheme(localStorage.getItem('kb-theme') || 'dark');

    // ── Modal ──
    const showModal = msg => { modalMsg.textContent = msg; modal.classList.add('open'); };
    const hideModal = () => modal.classList.remove('open');
    modalOk.addEventListener('click', hideModal);
    modal.addEventListener('click', e => { if (e.target === modal) hideModal(); });

    // ── WebGL Background ──
    (() => {
        const canvas = $('webgl-bg');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.setSize(innerWidth, innerHeight);
        renderer.setClearColor(0x000000, 0);

        const geo = new THREE.BufferGeometry();
        const verts = [];
        for (let i = 0; i < 800; i++) {
            verts.push((Math.random() - 0.5) * 1800, (Math.random() - 0.5) * 1800, (Math.random() - 0.5) * 1800);
        }
        geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));

        const mat = new THREE.PointsMaterial({ size: 1.8, color: 0x63b3ed, transparent: true, opacity: 0.4 });
        const points = new THREE.Points(geo, mat);
        scene.add(points);
        camera.position.z = 900;

        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', e => {
            mouseX = (e.clientX / innerWidth - 0.5) * 0.3;
            mouseY = (e.clientY / innerHeight - 0.5) * 0.3;
        });

        const animate = () => {
            requestAnimationFrame(animate);
            points.rotation.y += 0.0004 + mouseX * 0.001;
            points.rotation.x += 0.0002 + mouseY * 0.001;
            renderer.render(scene, camera);
        };
        animate();

        addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
    })();

    // ── Normalize ──
    const norm = s => (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

    // ── Highlight ──
    const hl = (text, term) => {
        if (!term || !text) return text;
        const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
    };

    // ── Skeletons ──
    const showSkeletons = () => {
        categoriesContainer.innerHTML = Array.from({ length: 5 }, () => `<div class="skeleton"></div>`).join('');
    };

    // ── Load Data ──
    const loadData = async () => {
        showSkeletons();
        try {
            const res = await fetch('./database.json');
            if (!res.ok) throw new Error();
            categories = await res.json();

            const set = new Set();
            let totalSubs = 0;
            categories.forEach(cat => {
                set.add(cat.name);
                cat.subjects.forEach(s => { set.add(s.name); totalSubs++; });
            });
            allSuggestions = [...set];

            statCats.textContent = `${categories.length} categorias`;
            statSubs.textContent = `${totalSubs} assuntos`;

            loaded = true;
            render(categories);
        } catch {
            categoriesContainer.innerHTML = '';
            showModal('Não foi possível carregar a base de conhecimento. Verifique se o arquivo database.json está disponível.');
        }
    };

    // ── Suggestions ──
    const renderSuggestions = list => {
        if (!list.length) {
            suggestionsBox.classList.remove('open');
            suggestionsBox.innerHTML = '';
            return;
        }
        suggestionsBox.innerHTML = list.map(s => `
            <div class="suggestion-item" data-value="${s.replace(/"/g, '&quot;')}">
                <svg class="suggestion-icon" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <span>${s}</span>
            </div>
        `).join('');
        suggestionsBox.classList.add('open');
        activeIdx = -1;

        suggestionsBox.querySelectorAll('.suggestion-item').forEach(el => {
            el.addEventListener('click', () => {
                searchInput.value = el.dataset.value;
                closeSuggestions();
                handleSearch();
            });
        });
    };

    const closeSuggestions = () => {
        suggestionsBox.classList.remove('open');
        suggestionsBox.innerHTML = '';
        activeIdx = -1;
    };

    // ── Render ──
    const render = (data = []) => {
        const term = searchInput.value.trim();
        categoriesContainer.innerHTML = '';

        if (!data.length) {
            const msg = term ? `Nenhum resultado para <strong>"${term}"</strong>.` : 'A base de conhecimento está vazia.';
            categoriesContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">◎</div>
                    <p>${msg}</p>
                </div>`;
            return;
        }

        data.forEach((cat, i) => {
            const subjects = cat.subjectsToDisplay || cat.subjects;
            const isOpen = cat.expanded || false;

            const card = document.createElement('div');
            card.className = `category-card${isOpen ? ' is-open' : ''}`;
            card.dataset.id = cat.id;

            const subjectsHTML = subjects.length
                ? subjects.map(sub => `
                    <div class="subject-item">
                        <div class="subject-bullet"></div>
                        <span class="subject-name">${hl(sub.name, term)}</span>
                    </div>`).join('')
                : `<p class="subjects-empty">Nenhum assunto nesta categoria.</p>`;

            card.innerHTML = `
                <div class="cat-header" role="button" aria-expanded="${isOpen}">
                    <div class="cat-header-left">
                        <span class="cat-index">${String(i + 1).padStart(2, '0')}</span>
                        <span class="cat-name">${hl(cat.name, term)}</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:0.6rem">
                        <span class="cat-count">${subjects.length}</span>
                        <svg class="cat-chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
                    </div>
                </div>
                <div class="subjects-panel${isOpen ? ' open' : ''}">
                    <div class="subjects-inner">
                        <div class="subjects-list">${subjectsHTML}</div>
                    </div>
                </div>`;

            card.querySelector('.cat-header').addEventListener('click', () => {
                const catObj = categories.find(c => c.id === cat.id);
                if (catObj) {
                    catObj.expanded = !catObj.expanded;
                    handleSearch();
                }
            });

            categoriesContainer.appendChild(card);
        });
    };

    // ── Search ──
    const handleSearch = () => {
        if (!loaded) return;
        const term = norm(searchInput.value.trim());
        clearBtn.style.display = term ? 'flex' : 'none';

        if (!term) {
            resultLabel.classList.remove('visible');
            render(categories.map(c => ({ ...c, subjectsToDisplay: c.subjects })));
            return;
        }

        const results = categories.map(cat => {
            const catMatch = norm(cat.name).includes(term);
            const subs = cat.subjects.filter(s => norm(s.name).includes(term));
            if (catMatch) return { ...cat, subjectsToDisplay: cat.subjects };
            if (subs.length) return { ...cat, subjectsToDisplay: subs };
            return null;
        }).filter(Boolean);

        const totalSubs = results.reduce((a, c) => a + (c.subjectsToDisplay || []).length, 0);
        resultLabel.innerHTML = `<span style="color:var(--accent)">${results.length}</span> categoria${results.length !== 1 ? 's' : ''}, <span style="color:var(--accent)">${totalSubs}</span> assunto${totalSubs !== 1 ? 's' : ''} encontrado${totalSubs !== 1 ? 's' : ''}`;
        resultLabel.classList.add('visible');
        render(results);
    };

    // ── Input Events ──
    searchInput.addEventListener('input', () => {
        handleSearch();
        const val = searchInput.value.trim();
        if (!val) { closeSuggestions(); return; }
        const normVal = norm(val);
        const filtered = allSuggestions.filter(s => norm(s).includes(normVal) && norm(s) !== normVal).slice(0, 5);
        renderSuggestions(filtered);
    });

    searchInput.addEventListener('keydown', e => {
        const items = suggestionsBox.querySelectorAll('.suggestion-item');
        if (!suggestionsBox.classList.contains('open') || !items.length) {
            if (e.key === 'Enter') { closeSuggestions(); handleSearch(); }
            return;
        }
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            activeIdx = (activeIdx + 1) % items.length;
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            activeIdx = (activeIdx - 1 + items.length) % items.length;
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (activeIdx > -1) items[activeIdx].click();
            else { closeSuggestions(); handleSearch(); }
            return;
        } else if (e.key === 'Escape') {
            closeSuggestions(); return;
        }
        items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
    });

    clearBtn.addEventListener('click', () => {
        searchInput.value = '';
        clearBtn.style.display = 'none';
        closeSuggestions();
        resultLabel.classList.remove('visible');
        render(categories.map(c => ({ ...c, subjectsToDisplay: c.subjects })));
        searchInput.focus();
    });

    document.addEventListener('click', e => {
        if (!e.target.closest('.search-wrapper') && !e.target.closest('.suggestions-box')) {
            closeSuggestions();
        }
    });

    loadData();
});
</script>
</body>
</html>
