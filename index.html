<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Base de Conhecimento — Explore categorias e assuntos de forma rápida e intuitiva.">
  <title>Base de Conhecimento</title>

  <!-- Favicon inline SVG via data URI (não precisa de arquivo extra) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23111620'/><circle cx='16' cy='16' r='7' fill='none' stroke='%236b9fff' stroke-width='2'/><path d='M20 20l4 4' stroke='%236b9fff' stroke-width='2' stroke-linecap='round'/></svg>">

  <!-- Fontes via Google Fonts CDN (funciona no GitHub Pages) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Three.js via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>

  <!-- CSS separado -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Canvas WebGL (fundo animado) -->
<canvas id="webgl-bg"></canvas>

<div id="app">

  <!-- ── HEADER ── -->
  <header class="site-header">
    <div class="logo-block">
      <div class="status-badge">
        <span class="status-dot"></span>
        sistema ativo
      </div>
      <h1 class="logo-title">
        Base de<br><em>Conhecimento</em>
      </h1>
      <p class="logo-sub">
        Navegue por categorias e assuntos de forma rápida e intuitiva
      </p>
    </div>

    <div class="header-right">
      <button class="icon-btn" id="themeBtn" title="Alternar tema (claro / escuro)" aria-label="Alternar tema">
        <!-- Ícone Sol (light) -->
        <svg id="iconSun" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="hidden" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <!-- Ícone Lua (dark) -->
        <svg id="iconMoon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>
      <div class="kbd-hint">
        <span class="kbd">Ctrl</span>+<span class="kbd">K</span> para buscar
      </div>
    </div>
  </header>

  <!-- ── ESTATÍSTICAS ── -->
  <div class="stats-row" id="statsRow" role="status" aria-live="polite">
    <div class="stat-chip">
      <div class="stat-dot" style="background:var(--blue)"></div>
      <b id="statCats">—</b>&nbsp;categorias
    </div>
    <div class="stat-chip">
      <div class="stat-dot" style="background:var(--teal)"></div>
      <b id="statSubs">—</b>&nbsp;assuntos
    </div>
  </div>

  <!-- ── BUSCA ── -->
  <section class="search-section" role="search">
    <div class="search-wrapper">
      <svg class="search-ico" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        type="search"
        id="searchInput"
        placeholder="Buscar categorias e assuntos…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Buscar na base de conhecimento"
      >
      <button class="search-clear" id="clearBtn" title="Limpar busca" aria-label="Limpar busca">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Sugestões de busca -->
    <div class="suggestions-box" id="suggestionsBox" role="listbox" aria-label="Sugestões de busca"></div>
  </section>

  <!-- Contador de resultados -->
  <div class="result-label" id="resultLabel" role="status" aria-live="polite"></div>

  <!-- ── CATEGORIAS ── -->
  <main id="categoriesContainer" aria-label="Lista de categorias"></main>

  <!-- ── RODAPÉ ── -->
  <footer class="site-footer" role="contentinfo">
    <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v4l2 2"/>
    </svg>
    Base de Conhecimento · Atualizado via database.json
  </footer>

</div><!-- /#app -->

<!-- ── MODAL DE ERRO ── -->
<div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-box">
    <div class="modal-icon" aria-hidden="true">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
      </svg>
    </div>
    <p class="modal-title" id="modalTitle">Atenção</p>
    <p class="modal-msg" id="modalMsg"></p>
    <button class="modal-btn" id="modalOk">Entendido</button>
  </div>
</div>

<!-- App JS (carregado por último, depois do DOM) -->
<script src="js/app.js"></script>

</body>
</html>
